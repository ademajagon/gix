name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    if: github.repository == 'ademajagon/gix'

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24"
          cache: true

      - name: Set up environment
        run: |
          echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_ENV
          echo "EXT=" >> $GITHUB_ENV
          if [ "${{ matrix.goos }}" = "windows" ]; then echo "EXT=.exe" >> $GITHUB_ENV; fi
          
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_NAME=gix-${{ matrix.goos }}-${{ matrix.goarch }}$EXT
          go build -ldflags "-X github.com/ademajagon/gix/cmd.version=${VERSION}" -o dist/$BIN_NAME .
          echo "Built $BIN_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum gix-* > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gix-*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}