name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    if: github.repository == 'ademajagon/gix'

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Set environment
        run: |
          echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_ENV
          echo "EXT=" >> $GITHUB_ENV
          if [ "${{ matrix.goos }}" = "windows" ]; then echo "EXT=.exe" >> $GITHUB_ENV; fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          BIN_NAME=gix-${{ matrix.goos }}-${{ matrix.goarch }}$EXT
          go build -ldflags "-X github.com/ademajagon/gix/cmd.version=${VERSION}" -o dist/$BIN_NAME .
          echo "Built $BIN_NAME"

      - uses: actions/upload-artifact@v6
        with:
          name: gix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  build-deb:
    name: Build .deb (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'ademajagon/gix'

    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v8
        with:
          name: gix-linux-${{ matrix.goarch }}
          path: dist/

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF##*/}"
          chmod +x dist/gix-linux-${{ matrix.goarch }}
          chmod +x packaging/build-deb.sh
          packaging/build-deb.sh "${VERSION}" "${{ matrix.goarch }}" \
            "dist/gix-linux-${{ matrix.goarch }}"

      - uses: actions/upload-artifact@v6
        with:
          name: deb-${{ matrix.goarch }}
          path: "*.deb"

  release:
    name: Github Release
    runs-on: ubuntu-latest
    needs: [build, build-deb]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum gix-* gix_* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gix-*
            dist/*.deb
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger homebrew-tap formula update
        run: |
          curl --fail-with-body -X POST \
            -H "Authorization: token ${{ secrets.TAP_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ademajagon/homebrew-tap/dispatches \
            -d "{\"event_type\": \"formula-update\", \"client_payload\": {\"product\": \"gix\", \"version\": \"${GITHUB_REF##*/}\"}}"

      - name: Trigger Chocolately publish
        run: |
          curl --fail-with-body -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ademajagon/gix/dispatches \
            -d "{\"event_type\": \"choco-publish\", \"client_payload\": {\"version\": \"${GITHUB_REF##*/}\"}}"
          
  publish-apt:
    name: Publish APT repo
    runs-on: ubuntu-latest
    needs: build-deb

    steps:
      - name: Install reprepro
        run: sudo apt-get install -y reprepro

      - name: Download .deb artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: deb-*
          merge-multiple: true
          path: debs/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Import GPG signing key
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          echo "${GPG_SIGNING_KEY}" | gpg --batch --import
          echo "Key imported: ${GPG_KEY_ID}"

      - name: Set up reprepro config
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          mkdir -p gh-pages/apt/conf
          cat > gh-pages/apt/conf/distributions <<EOF
          Origin: gix
          Label: gix
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: gix APT repository
          SignWith: ${GPG_KEY_ID}
          EOF

      - name: Add .deb packages to repo
        run: |
          for deb in debs/*.deb; do
            echo "Adding ${deb}"
            reprepro -b gh-pages/apt includedeb stable "${deb}"
          done

      - name: Commit and push APT repo
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(apt): publish ${GITHUB_REF##*/}"
          git push